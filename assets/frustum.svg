<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
<title id="title">Frustum camera field of view and pixel screen plane</title>
<desc id="desc">A camera frustum with a screen plane represented as a pixel matrix.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b001d"/><stop offset="1" stop-color="#002833"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<rect width="1400" height="500" rx="28" fill="url(#bg)"/>
<text x="62" y="66" fill="#ffe45c" font-family="monospace" font-size="34" font-weight="900">NOW: PERCEIVE THE SPACE WITH A CAMERA</text>
<text x="62" y="108" fill="#ffffff" font-family="monospace" font-size="24">The camera's field of view is modeled as a frustum.</text>
<g transform="translate(165 168)" filter="url(#glow)">
  <circle cx="0" cy="135" r="16" fill="#fff"/>
  <path d="M0,135 L550,20 L550,250 Z" fill="#00f5ff" opacity="0.13" stroke="#00f5ff" stroke-width="4"/>
  <rect x="550" y="20" width="20" height="230" fill="#ff2bd6"/>
  <text x="-82" y="176" fill="#ffffff" font-family="monospace" font-size="24">camera</text>
  <text x="590" y="60" fill="#ff9df2" font-family="monospace" font-size="24" font-weight="900">screen plane</text>
  <text x="590" y="96" fill="#ffffff" font-family="monospace" font-size="22">the 2D target</text>
  <text x="212" y="146" fill="#ffe45c" font-family="monospace" font-size="25" font-weight="900">FRUSTUM</text>
</g>
<g transform="translate(1020 152)" filter="url(#glow)">
  <rect x="0" y="0" width="270" height="220" rx="18" fill="#0f0030" stroke="#ffe45c" stroke-width="4"/>
  <g stroke="#00f5ff" stroke-width="2" opacity="0.8">
    <path d="M30 30 H240 M30 70 H240 M30 110 H240 M30 150 H240 M30 190 H240"/>
    <path d="M30 30 V190 M70 30 V190 M110 30 V190 M150 30 V190 M190 30 V190 M230 30 V190"/>
  </g>
  <rect x="70" y="70" width="40" height="40" fill="#ff2bd6" opacity="0.85"/>
  <rect x="150" y="110" width="40" height="40" fill="#ffe45c" opacity="0.85"/>
  <text x="12" y="268" fill="#b8ffff" font-family="monospace" font-size="22" font-weight="700">screen[y][x][rgb]</text>
</g>
</svg>